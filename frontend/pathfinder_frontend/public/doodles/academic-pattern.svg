<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <rect width="320" height="320" fill="none"/>
  <!-- Mortarboard -->
  <g opacity="0.12" fill="#7C3AED">
    <polygon points="40,55 60,45 80,55 60,65" />
    <rect x="56" y="65" width="8" height="14" rx="1"/>
    <line x1="60" y1="45" x2="60" y2="35" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="60" cy="33" r="3"/>
  </g>
  <!-- Book -->
  <g opacity="0.10" fill="none" stroke="#7C3AED" stroke-width="1.5">
    <rect x="130" y="30" width="28" height="36" rx="2"/>
    <line x1="144" y1="30" x2="144" y2="66"/>
    <line x1="134" y1="40" x2="142" y2="40"/>
    <line x1="134" y1="46" x2="142" y2="46"/>
  </g>
  <!-- Lightbulb -->
  <g opacity="0.10" fill="none" stroke="#7C3AED" stroke-width="1.5">
    <circle cx="240" cy="50" r="12"/>
    <line x1="236" y1="62" x2="244" y2="62"/>
    <line x1="237" y1="66" x2="243" y2="66"/>
    <line x1="240" y1="38" x2="240" y2="34"/>
    <line x1="228" y1="50" x2="224" y2="50"/>
    <line x1="252" y1="50" x2="256" y2="50"/>
  </g>
  <!-- Atom -->
  <g opacity="0.09" fill="none" stroke="#7C3AED" stroke-width="1.2">
    <circle cx="60" cy="180" r="6" fill="#7C3AED"/>
    <ellipse cx="60" cy="180" rx="22" ry="8" transform="rotate(0 60 180)"/>
    <ellipse cx="60" cy="180" rx="22" ry="8" transform="rotate(60 60 180)"/>
    <ellipse cx="60" cy="180" rx="22" ry="8" transform="rotate(120 60 180)"/>
  </g>
  <!-- Pencil -->
  <g opacity="0.11" fill="#7C3AED">
    <rect x="200" y="150" width="8" height="36" rx="1" transform="rotate(-30 204 168)"/>
    <polygon points="195,183 203,183 199,192" fill="#C4B5FD"/>
  </g>
  <!-- Star -->
  <g opacity="0.10" fill="#7C3AED">
    <polygon points="270,160 273,170 283,170 275,176 278,186 270,180 262,186 265,176 257,170 267,170"/>
  </g>
  <!-- DNA helix -->
  <g opacity="0.08" fill="none" stroke="#7C3AED" stroke-width="1.2">
    <path d="M140 140 Q150 155 140 170 Q130 185 140 200 Q150 215 140 230"/>
    <path d="M152 140 Q142 155 152 170 Q162 185 152 200 Q142 215 152 230"/>
    <line x1="140" y1="155" x2="152" y2="155"/>
    <line x1="140" y1="170" x2="152" y2="170"/>
    <line x1="140" y1="185" x2="152" y2="185"/>
    <line x1="140" y1="200" x2="152" y2="200"/>
    <line x1="140" y1="215" x2="152" y2="215"/>
  </g>
  <!-- Chart bars -->
  <g opacity="0.10" fill="#7C3AED">
    <rect x="230" y="230" width="8" height="40" rx="1"/>
    <rect x="242" y="220" width="8" height="50" rx="1"/>
    <rect x="254" y="238" width="8" height="32" rx="1"/>
    <rect x="266" y="210" width="8" height="60" rx="1"/>
    <line x1="226" y1="272" x2="278" y2="272" stroke="#7C3AED" stroke-width="1.5"/>
  </g>
</svg>
